<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyVision - Real-time Keyboard Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <h1>KeyVision</h1>
                <span class="subtitle">Live Keyboard Visualizer</span>
            </div>
            <nav class="layout-switcher" id="layout-switcher">
                <button data-os="windows" class="active">Windows</button>
                <button data-os="mac">Mac</button>
                <button data-os="chrome">Chromebook</button>
            </nav>
        </header>

        <main class="keyboard-container" id="keyboard-container">
            <!-- SVG will be injected here by app.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/layouts.js"></script>
    <script src="js/mapper.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
